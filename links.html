<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="linksTitle">Links</title>
  <link rel="stylesheet" href="style.css">
</head>
<body id="links">
  <header class="main-header">
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">🌙</button>

    <select id="lang-select" class="lang-select" aria-label="Select language">
      <option value="en" selected>English</option>
      <option value="id">Indonesia</option>
    </select>
  </header>

  <main>
    <section id="links" class="fade-up">
      <h1 data-i18n="linksTitle">Connect with Me</h1>
      <p class="tagline" data-i18n="linksDesc">Here are my current social profiles.</p>

      <div class="hero-buttons-vertical">
        <a href="https://x.com/username" target="_blank">
          <img src="icons/x.svg" alt="X" class="social-icon">
          <span data-i18n="xLink">X</span>
        </a>
        <a href="https://bsky.app/profile/username.bsky.social" target="_blank">
          <img src="icons/bluesky.svg" alt="Bluesky" class="social-icon">
          <span data-i18n="bskyLink">Bluesky</span>
        </a>
        <a href="https://t.me/username" target="_blank">
          <img src="icons/telegram.svg" alt="Telegram" class="social-icon">
          <span data-i18n="telegramLink">Telegram</span>
        </a>
      </div>

      <div class="hero-buttons-vertical">
        <a href="index.html"><span data-i18n="aboutFooter">Back to Home</span></a>
      </div>
    </section>
  </main>

  <footer>
    <p data-i18n="footer">© 2025 Nohakuun. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
